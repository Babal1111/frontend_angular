<button (click)="changeTitle()">click here to change the title</button><br>
<button (click)="cardView()">Do you want to see in form of cards</button>
<button (click)="listView()">Do you want to see in form of List</button>
  
 <!-- <app-user-details name="Chandan" address="Udaipur"  age="30" gender="male"/> -->


 @if(viewType=="cardView"){
  <div class="cardView">
    @for(user of users; track user.name; let i = $index){
    <app-user-details (onupdate)="parentAction($event)" name="{{user.name}}" address="{{user.address}}"  [age]="user.age" gender="{{user.gender}}" [index] = "i+1"/>
 }
  </div>
  
 }
 @else if(viewType=="listView"){
  <div class="listView">
    @for(user of users; track user.name; let i = $index){
    <app-user-list name="{{user.name}}" address="{{user.address}}"  [age]="user.age"  gender="{{user.gender}}" [index] = "i+1"/>
    }
  </div>
   
 }

</div>
