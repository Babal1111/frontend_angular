        function populate(){
            let btn = document.createElement('button');
            btn.innerHTML = "change colour";
            btn.id = "changeClrBtn";
            el2.appendChild(btn)
            for(let laptop of laptops){
                let tr1 = document.createElement('tr');
                for(let key in laptop){
                    let th = document.createElement('th');
                    th.innerHTML = key;
                    tr1.appendChild(th);
                }
                tr1.id="tableHeading";
                tr1.style.backgroundColor ="green";
                el.appendChild(tr1);
                break;
            }
            for(let laptop of laptops){
                let tr = document.createElement('tr');
                for(let key in laptop){
                    console.log(key);
                    let td = document.createElement('td');
                    td.innerHTML = laptop[key];
                    tr.appendChild(td);
                }
                el.appendChild(tr);
            }

            let btn2 = document.getElementById("changeClrBtn");
            btn2.onclick= ()=>{
                let heading =  document.getElementById("tableHeading");
                if(heading.style.background == "green"){
                    heading.style.background = "red";
                }else{
                    heading.style.background = "green";
                }
               
            
            }
        }
