<div class="customer-list-div">

    
<h2>Customer List</h2><br>
<table border="1" cellpadding="5" >
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Address</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Date of Birth</th>
      <th>Gender</th>
    </tr>
  </thead>
  @for(customer of customers; track customer.id){
    <tbody>
    <tr>
      <td>{{ customer.id | number:'2.0'}}</td>
      <td>{{ customer.name }}</td>
      <td>{{ customer.address }}</td>
      <td>{{ customer.email }}</td>
      <td>{{ customer.phone }}</td>
      <td>{{ customer.dateOfBirth | date:'mediumDate'}}</td>
      <td>{{ customer.gender }}</td>
    </tr>
  </tbody>
}
  
</table>

<br><br>
